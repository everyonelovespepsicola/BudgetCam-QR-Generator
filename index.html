<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetCam QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252526;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
            max-width: 95%;
        }
        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        h2 { 
            margin: 0; 
            color: #569cd6; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        .title-container svg {
            width: 40px;
            height: 40px;
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #858585; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #3c3c3c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus { outline: 1px solid #007acc; border-color: transparent; }
        
        .slider-container { margin: 25px 0; }
        input[type="range"] { width: 100%; margin-bottom: 10px; accent-color: #007acc; }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }
        .active-label { color: #ce9178 !important; font-weight: bold; }
        
        .qr-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .payload-box {
            margin-top: 15px;
            background: #3c3c3c;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Cascadia Code', Consolas, monospace;
            font-size: 12px; 
            color: white;
            word-break: break-all;
            border: 1px solid #444;
        }

        .btn-download {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #0e639c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover { background-color: #1177bb; }

    </style>
</head>
<body>

<div class="container">
    <div class="title-container">
        <h2>BudgetCam QR Generator</h2>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" overflow="visible">
            <defs>
              <linearGradient id="red-ray" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff0000" stop-opacity="0.9" />
                <stop offset="40%" stop-color="#ff3333" stop-opacity="0.6" />
                <stop offset="100%" stop-color="#ff0000" stop-opacity="0" />
              </linearGradient>
            </defs>
          
            <style>
              .beam {
                fill: url(#red-ray);
                transform-origin: 250px -50px; 
              }
              
              .beam-1 { animation: erratic-shine 0.7s linear infinite; }
              .beam-2 { animation: erratic-shine 1.1s linear infinite; animation-delay: -0.3s; }
              .beam-3 { animation: erratic-shine 0.9s linear infinite; animation-delay: -0.6s; }
          
              @keyframes erratic-shine {
                0% { opacity: 0.1; transform: rotate(0deg) scale(1); }
                15% { opacity: 0.9; transform: rotate(3deg) scale(1.02); }
                25% { opacity: 0.3; transform: rotate(-2deg) scale(0.98); }
                40% { opacity: 1.0; transform: rotate(5deg) scale(1.05); }
                55% { opacity: 0.2; transform: rotate(-4deg) scale(0.95); }
                70% { opacity: 0.8; transform: rotate(1deg) scale(1.01); }
                85% { opacity: 0.1; transform: rotate(-3deg) scale(0.97); }
                100% { opacity: 0.5; transform: rotate(0deg) scale(1); }
              }
            </style>
          
            <rect x="0" y="0" width="200" height="200" fill="#ffffff" rx="12" />
          
            <g fill="#222222">
              <rect x="20" y="20" width="45" height="45" rx="4" /><rect x="27.5" y="27.5" width="30" height="30" fill="#ffffff" rx="2" /><rect x="35" y="35" width="15" height="15" rx="2" />
              <rect x="135" y="20" width="45" height="45" rx="4" /><rect x="142.5" y="27.5" width="30" height="30" fill="#ffffff" rx="2" /><rect x="150" y="35" width="15" height="15" rx="2" />
              <rect x="20" y="135" width="45" height="45" rx="4" /><rect x="27.5" y="142.5" width="30" height="30" fill="#ffffff" rx="2" /><rect x="35" y="150" width="15" height="15" rx="2" />
              <rect x="75" y="20" width="15" height="15" rx="2" /><rect x="100" y="20" width="25" height="15" rx="2" /><rect x="75" y="45" width="30" height="15" rx="2" /><rect x="115" y="45" width="10" height="15" rx="2" /><rect x="20" y="75" width="15" height="15" rx="2" /><rect x="45" y="75" width="30" height="15" rx="2" /><rect x="85" y="75" width="15" height="15" rx="2" /><rect x="110" y="75" width="40" height="15" rx="2" /><rect x="160" y="75" width="20" height="15" rx="2" /><rect x="20" y="100" width="40" height="15" rx="2" /><rect x="70" y="100" width="15" height="15" rx="2" /><rect x="95" y="100" width="25" height="15" rx="2" /><rect x="130" y="100" width="15" height="40" rx="2" /><rect x="155" y="100" width="25" height="15" rx="2" /><rect x="75" y="135" width="15" height="25" rx="2" /><rect x="100" y="135" width="20" height="15" rx="2" /><rect x="155" y="125" width="25" height="15" rx="2" /><rect x="75" y="170" width="45" height="10" rx="2" /><rect x="130" y="150" width="15" height="30" rx="2" /><rect x="155" y="150" width="25" height="30" rx="2" />
            </g>
            <g>
              <polygon class="beam beam-1" points="250,-50 -50,20 -50,120" /><polygon class="beam beam-2" points="250,-50 -50,120 50,250" /><polygon class="beam beam-3" points="250,-50 100,250 250,250" />
            </g>
        </svg>
    </div>
    
    <div class="input-group">
        <label>Wi-Fi Name (SSID)</label>
        <input type="text" id="ssid" value="Home_Network" oninput="update()">
    </div>
    
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="pass" value="password123" oninput="update()">
    </div>

    <div class="input-group">
        <label for="token">Extra Token (If required, should not be blank)</label>
        <input type="text" id="token" value="offline_mode_only" oninput="update()">
    </div>

    <div class="slider-container">
        <input type="range" id="syntax" min="0" max="2" value="1" oninput="update()">
        <div class="slider-labels">
            <span id="l0">WIFI:S:</span>
            <span id="l1">JSON</span>
            <span id="l2">BASE64</span>
        </div>
    </div>

    <div class="qr-card">
        <canvas id="canvas"></canvas>
    </div>
    <button class="btn-download" onclick="downloadQR()">Download PNG</button>

    <div class="payload-box" id="preview"></div>

</div>

<script>
    const qr = new QRious({ element: document.getElementById('canvas'), size: 200, level: 'H' });

    function update() {
        const s = document.getElementById('ssid').value;
        const p = document.getElementById('pass').value;
        const t = document.getElementById('token').value;
        const mode = document.getElementById('syntax').value;
        
        let msg = "";
        [0,1,2].forEach(i => document.getElementById('l'+i).className = (i == mode ? 'active-label' : ''));

        if(mode == 0) msg = `WIFI:S:${s};T:WPA;P:${p};;`;
        else if(mode == 1) msg = JSON.stringify({s, p, t});
        else msg = btoa(JSON.stringify({s, p, t}));

        document.getElementById('preview').innerText = msg;
        qr.value = msg;
    }

    function downloadQR() {
        const link = document.createElement('a');
        link.download = 'camera-payload.png';
        link.href = document.getElementById('canvas').toDataURL();
        link.click();
    }

    update();
</script>
</body>
</html>
